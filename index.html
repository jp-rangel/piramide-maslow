<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pirámide de Maslow Interactiva</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <div class="pyramid">
        <div class="level" id="autorrealizacion">
            <img src="imagenes/success.svg" class="icon-autorrealizacion">
        </div>

        <div class="level" id="reconocimiento">
            <img src="imagenes/confident.svg" class="icon-reconocimiento">
        </div>

        <div class="level" id="afiliacion">
            <img src="imagenes/hand-gestures.svg" class="icon-afiliacion">
        </div>
        <div class="level" id="seguridad">
            <img src="imagenes/security.svg" class="icon-seguridad">
        </div>
        <div class="level" id="fisiologicas">
            <img src="imagenes/serving.svg" class="icon-fisio">
        </div>
    </div>

    <div class="info" id="infoBox">
        <h2>Selecciona un nivel</h2>
        <p>Haz clic en cualquier nivel para ver más información.</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
